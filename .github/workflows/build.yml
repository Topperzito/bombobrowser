name: Build BomboBrowser

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:

  # ============================================================
  #  LINUX (Ubuntu 24.04)
  # ============================================================
  build-linux:
    name: Linux (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm rustc cargo lld \
            nasm yasm \
            libgtk-3-dev libdbus-glib-1-dev \
            libpulse-dev libasound2-dev \
            libx11-xcb-dev libxt-dev \
            libxext-dev libxrender-dev \
            libxrandr-dev libxdamage-dev \
            libxfixes-dev libxcomposite-dev \
            libxss-dev libxcursor-dev \
            libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            pkg-config autoconf rsync \
            python3-pip python3-venv \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo bash -
          sudo apt-get install -y nodejs
          sudo ln -sf /usr/bin/node /usr/bin/nodejs || true
          which cbindgen || cargo install cbindgen
          # Fix pyyaml conflict
          pip3 uninstall -y pyyaml || true
          pip3 install 'pyyaml==6.0.2'

      - name: Clone Firefox source
        run: git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src

      - name: Apply BomboBrowser patches
        run: |
          rsync -av patches/ firefox-src/
          cp patches/.mozconfig firefox-src/.mozconfig

      - name: Build
        run: |
          cd firefox-src
          python3 ./mach build -j2

      - name: Package → tar.gz
        run: |
          PKGNAME="bombobrowser-$(date +%Y%m%d)-x86_64"
          mkdir -p "dist/$PKGNAME/icons" "dist/$PKGNAME/docs"

          OBJDIR=$(ls -d firefox-src/obj-* 2>/dev/null | head -1)
          [ -z "$OBJDIR" ] && { echo "ERROR: obj-* not found"; exit 1; }

          cp "$OBJDIR/dist/bin/firefox" "dist/$PKGNAME/bombobrowser"
          strip "dist/$PKGNAME/bombobrowser"

          for f in firefox-src/browser/branding/bombo/default*.png; do
            [ -f "$f" ] || continue
            sz=$(basename "$f" | sed 's/default\(.*\)\.png/\1/')
            cp "$f" "dist/$PKGNAME/icons/${sz}.png"
          done

          [ -f install.sh ] && cp install.sh "dist/$PKGNAME/install.sh" && chmod +x "dist/$PKGNAME/install.sh"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=BomboBrowser' \
            'Comment=Privacy-focused Firefox fork' \
            'Exec=bombobrowser %u' \
            'Icon=bombobrowser' \
            'Type=Application' \
            'Categories=Network;WebBrowser;' \
            'Terminal=false' \
            'StartupNotify=true' \
            'StartupWMClass=BomboBrowser' \
            'MimeType=text/html;text/xml;application/xhtml+xml;x-scheme-handler/http;x-scheme-handler/https;' \
            > "dist/$PKGNAME/bombobrowser.desktop"

          printf '%s\n' \
            '#!/bin/bash' \
            'set -e' \
            '[[ $EUID -ne 0 ]] && { echo "Run with sudo."; exit 1; }' \
            'rm -f /usr/local/bin/bombobrowser' \
            'rm -f /usr/local/share/applications/bombobrowser.desktop' \
            'for sz in 16 22 24 32 48 64 128 256; do' \
            '  rm -f "/usr/local/share/icons/hicolor/${sz}x${sz}/apps/bombobrowser.png"' \
            'done' \
            'rm -rf /usr/local/share/doc/bombobrowser' \
            'echo "BomboBrowser uninstalled."' \
            > "dist/$PKGNAME/uninstall.sh"
          chmod +x "dist/$PKGNAME/uninstall.sh"

          [ -f README.md ] && cp README.md "dist/$PKGNAME/docs/" 2>/dev/null || true
          [ -f LICENSE ]   && cp LICENSE   "dist/$PKGNAME/docs/" 2>/dev/null || true

          cd dist
          tar czf "${PKGNAME}.tar.gz" "${PKGNAME}/"
          echo "LINUX_ASSET=${PKGNAME}.tar.gz" >> "$GITHUB_ENV"
          ls -lh "${PKGNAME}.tar.gz"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-linux-x86_64
          path: dist/*.tar.gz
          retention-days: 30

  # ============================================================
  #  WINDOWS (windows-2022)
  # ============================================================
  build-windows:
    name: Windows (2022)
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Install MozillaBuild
        shell: powershell
        run: |
          $url = "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
          $out = "$env:TEMP\MozillaBuild.exe"
          Invoke-WebRequest $url -OutFile $out
          Start-Process -FilePath $out -ArgumentList "/S" -Wait
          echo "C:\mozilla-build" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cbindgen
        shell: cmd
        run: cargo install cbindgen

      - name: Install rsync (Git for Windows)
        shell: powershell
        run: |
          # rsync is bundled with Git for Windows; add its usr/bin to PATH
          $gitUsrBin = "C:\Program Files\Git\usr\bin"
          if (Test-Path $gitUsrBin) {
            echo "$gitUsrBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Error "rsync not found. Install Git for Windows first."
            exit 1
          }

      - name: Clone Firefox source
        shell: cmd
        run: git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src

      - name: Apply BomboBrowser patches
        shell: bash
        run: |
          rsync -av patches/ firefox-src/
          cp patches/.mozconfig-windows firefox-src/.mozconfig

      - name: Build
        shell: bash
        run: |
          cd firefox-src
          python3 ./mach build -j2

      - name: Package → installer
        shell: bash
        run: |
          PKGNAME="bombobrowser-$(date +%Y%m%d)-win64"
          OBJDIR=$(ls -d firefox-src/obj-* 2>/dev/null | head -1)
          [ -z "$OBJDIR" ] && { echo "ERROR: obj-* not found"; exit 1; }

          mkdir -p "dist/$PKGNAME"
          cp "$OBJDIR/dist/bin/firefox.exe" "dist/$PKGNAME/bombobrowser.exe"

          cp "$OBJDIR/dist/bin/"*.dll           "dist/$PKGNAME/"     2>/dev/null || true
          cp -r "$OBJDIR/dist/bin/browser"      "dist/$PKGNAME/browser"   2>/dev/null || true
          cp -r "$OBJDIR/dist/bin/defaults"     "dist/$PKGNAME/defaults"  2>/dev/null || true

          printf '%s\n' \
            '!include "MUI2.nsh"' \
            'Name "BomboBrowser"' \
            'OutFile "bombobrowser-setup.exe"' \
            'InstallDir "$PROGRAMFILES64\BomboBrowser"' \
            'InstallDirRegKey HKCU "Software\BomboBrowser" ""' \
            'RequestExecutionLevel admin' \
            '' \
            '!insertmacro MUI_PAGE_DIRECTORY' \
            '!insertmacro MUI_PAGE_INSTFILES' \
            '!insertmacro MUI_UNPAGE_CONFIRM' \
            '!insertmacro MUI_UNPAGE_INSTFILES' \
            '!insertmacro MUI_LANGUAGE "Spanish"' \
            '' \
            'Section "Install"' \
            '  SetOutPath "$INSTDIR"' \
            '  File /r "bombobrowser-*-win64\*.*"' \
            '  WriteUninstaller "$INSTDIR\uninstall.exe"' \
            '  CreateShortcut "$DESKTOP\BomboBrowser.lnk" "$INSTDIR\bombobrowser.exe"' \
            '  CreateDirectory "$SMPROGRAMS\BomboBrowser"' \
            '  CreateShortcut "$SMPROGRAMS\BomboBrowser\BomboBrowser.lnk" "$INSTDIR\bombobrowser.exe"' \
            '  WriteRegStr HKCU "Software\BomboBrowser" "" "$INSTDIR"' \
            'SectionEnd' \
            '' \
            'Section "Uninstall"' \
            '  Delete "$INSTDIR\uninstall.exe"' \
            '  RMDir /r "$INSTDIR"' \
            '  Delete "$DESKTOP\BomboBrowser.lnk"' \
            '  RMDir /r "$SMPROGRAMS\BomboBrowser"' \
            '  DeleteRegKey HKCU "Software\BomboBrowser"' \
            'SectionEnd' \
            > "dist/installer.nsi"

          cd dist
          if command -v makensis &>/dev/null; then
            makensis installer.nsi
            mv bombobrowser-setup.exe "${PKGNAME}-setup.exe"
          else
            powershell -Command "Compress-Archive -Path '${PKGNAME}' -DestinationPath '${PKGNAME}.zip'"
          fi
          ls -lh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-windows-x86_64
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30

  # ============================================================
  #  RELEASE  (only on push/workflow_dispatch, after both builds)
  # ============================================================
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version tag
        id: ver
        run: |
          TAG="v$(date +%Y%m%d)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "BomboBrowser ${{ steps.ver.outputs.tag }}"
          body: |
            ## BomboBrowser ${{ steps.ver.outputs.tag }}
            Navegador web basado en Firefox con privacidad reforzada.

            ---

            ### 🐧 Linux
            ```bash
            bash <(curl -sL https://github.com/Topperzito/bombobrowser/raw/main/installers/linux-install.sh)
            ```

            O descarga el tarball y ejecuta:
            ```bash
            tar xzf bombobrowser-*-x86_64.tar.gz
            cd bombobrowser-*-x86_64
            sudo ./install.sh
            ```

            ### 🪟 Windows
            Descarga el instalador `.exe` o el `.zip` desde los assets adjuntos.
          files: |
            artifacts/bombobrowser-linux-x86_64/*.tar.gz
            artifacts/bombobrowser-windows-x86_64/*.exe
            artifacts/bombobrowser-windows-x86_64/*.zip
          make_latest: true
          fail_on_unmatched_files: false
