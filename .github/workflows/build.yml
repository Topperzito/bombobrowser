name: Build BomboBrowser

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Check for Firefox security updates daily
    - cron: "0 6 * * *"

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm rustc cargo lld \
            nasm yasm \
            libgtk-3-dev libdbus-glib-1-dev \
            libpulse-dev libasound2-dev \
            libx11-xcb-dev libxt-dev \
            libxext-dev libxrender-dev \
            libxrandr-dev libxdamage-dev \
            libxfixes-dev libxcomposite-dev \
            libxss-dev libxcursor-dev \
            libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            pkg-config autoconf \
            python3-pip python3-venv
          # Install Node.js v20
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo bash -
          sudo apt-get install -y nodejs
          # Ensure 'nodejs' command exists (Firefox checks for it)
          sudo ln -sf /usr/bin/node /usr/bin/nodejs
          # Install cbindgen if not available
          which cbindgen || cargo install cbindgen

      - name: Clone Firefox source
        run: git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src

      - name: Apply BomboBrowser patches
        run: rsync -av patches/ firefox-src/

      - name: Build BomboBrowser
        run: |
          cd firefox-src
          python3 ./mach build -j2

      - name: Package BomboBrowser
        run: |
          PKGNAME="bombobrowser-$(date +%Y%m%d)-x86_64"
          mkdir -p dist/$PKGNAME/icons docs

          # Copy binary
          OBJDIR=$(ls -d firefox-src/obj-* 2>/dev/null | head -1)
          if [ -z "$OBJDIR" ]; then
            echo "ERROR: No obj-* directory found in firefox-src/"
            ls firefox-src/
            exit 1
          fi
          cp "$OBJDIR/dist/bin/firefox" "dist/$PKGNAME/bombobrowser"
          strip "dist/$PKGNAME/bombobrowser"

          # Copy icons from branding
          cd firefox-src/browser/branding/bombo
          for f in default*.png; do
            size=$(echo "$f" | sed 's/default\(.*\)\.png/\1/')
            cp "$f" "../../../../dist/$PKGNAME/icons/${size}.png"
          done
          cd ../../../..

          # Copy install script
          cp install.sh "dist/$PKGNAME/install.sh"
          chmod +x "dist/$PKGNAME/install.sh"

          # Create uninstall script
          cat > "dist/$PKGNAME/uninstall.sh" << 'UNINSTALL'
          #!/bin/bash
          set -e
          if [[ $EUID -ne 0 ]]; then
              echo "Run with sudo."; exit 1
          fi
          rm -f /usr/local/bin/bombobrowser
          rm -f /usr/local/share/applications/bombobrowser.desktop
          for size in 16 32 48 64 128; do
            rm -f "/usr/local/share/icons/hicolor/${size}x${size}/apps/bombobrowser.png"
          done
          rm -rf /usr/local/share/doc/bombobrowser
          echo "BomboBrowser uninstalled."
          UNINSTALL
          chmod +x "dist/$PKGNAME/uninstall.sh"

          # Copy docs
          cp README.md "dist/$PKGNAME/docs/" 2>/dev/null || true
          cp LICENSE "dist/$PKGNAME/docs/" 2>/dev/null || true

          # Create desktop file
          cat > "dist/$PKGNAME/bombobrowser.desktop" << EOF
          [Desktop Entry]
          Name=BomboBrowser
          Comment=Privacy-focused Firefox fork
          Exec=bombobrowser
          Icon=bombobrowser
          Type=Application
          Categories=Network;WebBrowser;
          Terminal=false
          StartupNotify=true
          EOF

          # Create tarball
          cd dist
          tar czf "$PKGNAME.tar.gz" "$PKGNAME/"
          ls -lh "$PKGNAME.tar.gz"
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-linux-x86_64
          path: dist/*.tar.gz


