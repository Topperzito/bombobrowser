name: Build BomboBrowser

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Check for Firefox security updates daily
    - cron: "0 6 * * *"

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm rustc cargo lld \
            nodejs \
            nasm yasm \
            libgtk-3-dev libdbus-glib-1-dev \
            libpulse-dev libasound2-dev \
            libx11-xcb-dev libxt-dev \
            libxext-dev libxrender-dev \
            libxrandr-dev libxdamage-dev \
            libxfixes-dev libxcomposite-dev \
            libxss-dev libxcursor-dev \
            libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            pkg-config autoconf cbindgen \
            python3-pip python3-venv
          which node || sudo ln -sf /usr/bin/nodejs /usr/local/bin/node || true

      - name: Clone Firefox source
        run: git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src

      - name: Apply BomboBrowser patches
        run: rsync -av patches/ firefox-src/

      - name: Configure build
        run: |
          cd firefox-src
          python3 ./mach configure

      - name: Build
        run: |
          cd firefox-src
          python3 ./mach build -j2

      - name: Package AppImage
        run: |
          sudo wget -O /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
          mkdir -p dist
          cd firefox-src
          mkdir -p BomboBrowser.AppDir/usr/bin
          cp obj-*/dist/bin/firefox BomboBrowser.AppDir/usr/bin/bombobrowser
          cp browser/branding/bombo/default128.png BomboBrowser.AppDir/bombobrowser.png
          cat > BomboBrowser.AppDir/bombobrowser.desktop << 'EOF'
          [Desktop Entry]
          Name=BomboBrowser
          Exec=bombobrowser
          Icon=bombobrowser
          Type=Application
          Categories=Network;WebBrowser;
          EOF
          appimagetool BomboBrowser.AppDir dist/bombobrowser-linux-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-linux-x86_64
          path: dist/*.AppImage


