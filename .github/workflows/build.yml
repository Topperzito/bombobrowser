name: Build BomboBrowser

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Check for Firefox security updates daily
    - cron: "0 6 * * *"

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm rustc cargo \
            nodejs npm \
            nasm yasm \
            libgtk-3-dev libdbus-glib-1-dev \
            libpulse-dev libasound2-dev \
            libx11-xcb-dev libxt-dev \
            libxext-dev libxrender-dev \
            libxrandr-dev libxdamage-dev \
            libxfixes-dev libxcomposite-dev \
            libxss-dev libxcursor-dev \
            libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            pkg-config autoconf \
            python3-pip python3.12-venv

      - name: Clone Firefox source
        run: |
          git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src
          cd firefox-src

      - name: Apply BomboBrowser patches
        run: |
          rsync -av patches/ firefox-src/
          cp .mozconfig firefox-src/.mozconfig

      - name: Configure build
        run: |
          cd firefox-src
          python3.12 ./mach configure

      - name: Build
        run: |
          cd firefox-src
          python3.12 ./mach build -j$(nproc)

      - name: Package AppImage
        run: |
          mkdir -p dist
          cd firefox-src
          # Create AppImage structure
          mkdir -p BomboBrowser.AppDir/usr/bin
          cp obj-*/dist/bin/firefox BomboBrowser.AppDir/usr/bin/bombobrowser
          cp -r obj-*/dist/bin/* BomboBrowser.AppDir/usr/bin/
          # Create .desktop file
          cat > BomboBrowser.AppDir/bombobrowser.desktop << EOF
          [Desktop Entry]
          Name=BomboBrowser
          Exec=bombobrowser
          Icon=bombobrowser
          Type=Application
          Categories=Network;WebBrowser;
          EOF
          # Copy icon
          cp browser/branding/bombo/default128.png BomboBrowser.AppDir/bombobrowser.png
          # Create AppImage
          cd BomboBrowser.AppDir
          appimagetool-x86_64 .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-linux-${{ matrix.arch }}
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Install MozillaBuild
        run: |
          choco install mozilla-build -y

      - name: Clone and Build
        run: |
          git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src
          rsync -av patches/ firefox-src/
          cp .mozconfig firefox-src/.mozconfig
          cd firefox-src
          ./mach build -j$(nproc)

      - name: Package NSIS installer
        run: |
          cd firefox-src
          ./mach package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-win64
          path: firefox-src/obj-*/dist/install/sea/*.exe

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install rust node

      - name: Clone and Build
        run: |
          git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src
          rsync -av patches/ firefox-src/
          cp .mozconfig firefox-src/.mozconfig
          cd firefox-src
          ./mach build -j$(sysctl -n hw.logicalcpu)

      - name: Package DMG
        run: |
          cd firefox-src
          ./mach package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-macos
          path: firefox-src/obj-*/dist/*.dmg
