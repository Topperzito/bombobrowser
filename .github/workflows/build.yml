name: Build BomboBrowser

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Check for Firefox security updates daily
    - cron: "0 6 * * *"

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm rustc cargo lld \
            nodejs npm \
            nasm yasm \
            libgtk-3-dev libdbus-glib-1-dev \
            libpulse-dev libasound2-dev \
            libx11-xcb-dev libxt-dev \
            libxext-dev libxrender-dev \
            libxrandr-dev libxdamage-dev \
            libxfixes-dev libxcomposite-dev \
            libxss-dev libxcursor-dev \
            libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            pkg-config autoconf \
            python3-pip python3.12-venv

      - name: Clone Firefox source
        run: git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src

      - name: Apply BomboBrowser patches
        run: rsync -av patches/ firefox-src/

      - name: Configure build
        run: |
          cd firefox-src
          python3.12 ./mach configure

      - name: Build
        run: |
          cd firefox-src
          python3.12 ./mach build -j$(nproc)

      - name: Package AppImage
        run: |
          sudo wget -O /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
          mkdir -p dist
          cd firefox-src
          mkdir -p BomboBrowser.AppDir/usr/bin
          cp obj-*/dist/bin/firefox BomboBrowser.AppDir/usr/bin/bombobrowser
          cp browser/branding/bombo/default128.png BomboBrowser.AppDir/bombobrowser.png
          cat > BomboBrowser.AppDir/bombobrowser.desktop << 'EOF'
          [Desktop Entry]
          Name=BomboBrowser
          Exec=bombobrowser
          Icon=bombobrowser
          Type=Application
          Categories=Network;WebBrowser;
          EOF
          appimagetool BomboBrowser.AppDir dist/bombobrowser-linux-${{ matrix.arch }}.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-linux-${{ matrix.arch }}
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        shell: pwsh
        run: |
          choco install python3 wixtoolset -y --no-progress
          # MozillaBuild provides MSYS environment needed for Firefox build
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe" -OutFile "$env:TEMP\mb.exe"
          Start-Process "$env:TEMP\mb.exe" -ArgumentList "/S /D=C:\mozilla-build" -Wait

      - name: Clone & Apply patches
        shell: cmd
        run: |
          git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src
          xcopy patches firefox-src\patches\ /E /I /Y
          xcopy patches\.mozconfig firefox-src\ /Y

      - name: Build
        shell: cmd
        run: |
          set "MOZBUILD=C:\mozilla-build"
          set "PATH=%MOZBUILD%\bin;%MOZBUILD%\msys\bin;%PATH%"
          set "PYTHON3=%MOZBUILD%\python3\python3.exe"
          cd firefox-src
          %MOZBUILD%\start-shell.bat -c "./mach build -j4"

      - name: Package
        shell: cmd
        run: |
          set "MOZBUILD=C:\mozilla-build"
          set "PATH=%MOZBUILD%\bin;%MOZBUILD%\msys\bin;%PATH%"
          cd firefox-src
          %MOZBUILD%\start-shell.bat -c "./mach package"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-win64
          path: firefox-src/obj-*/dist/install/sea/*.exe

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install rust node python@3.12
          brew link --overwrite python@3.12

      - name: Clone Firefox source
        run: git clone --depth=1 https://github.com/mozilla/gecko-dev.git firefox-src

      - name: Apply patches
        run: rsync -av patches/ firefox-src/

      - name: Build
        run: |
          cd firefox-src
          python3.12 ./mach build -j$(sysctl -n hw.logicalcpu)

      - name: Package DMG
        run: |
          cd firefox-src
          ./mach package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombobrowser-macos
          path: firefox-src/obj-*/dist/*.dmg
