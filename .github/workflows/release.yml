name: Release BomboBrowser

on:
  workflow_run:
    workflows: ["Build BomboBrowser"]
    types: [completed]

jobs:
  release:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.ref_name || '1.0.0' }}
          name: BomboBrowser ${{ github.ref_name || '1.0.0' }}
          body: |
            ## BomboBrowser
            
            Descarga el tarball para Linux desde los artifacts.
          files: |
            bombobrowser-linux-x86_64/*.tar.gz
