name: Release BomboBrowser

on:
  workflow_run:
    workflows: ["Build BomboBrowser"]
    types: [completed]

jobs:
  release:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          cd bombobrowser-linux-x86_64
          sha256sum *.AppImage > ../checksums.txt
          cd ../bombobrowser-win64
          sha256sum *.exe >> ../checksums.txt
          cd ../bombobrowser-macos
          sha256sum *.dmg >> ../checksums.txt
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.ref_name || '1.0.0' }}
          name: BomboBrowser ${{ github.ref_name || '1.0.0' }}
          body: |
            ## BomboBrowser
            
            Descarga para tu plataforma:
            - **Linux**: AppImage (funciona en cualquier distro)
            - **Windows**: Instalador NSIS
            - **macOS**: DMG
            
            Checksums verificados en checksums.txt
          files: |
            bombobrowser-linux-x86_64/*.AppImage
            bombobrowser-win64/*.exe
            bombobrowser-macos/*.dmg
            checksums.txt
